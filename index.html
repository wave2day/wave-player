<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>iPod glass body</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/body.css" />
  <link rel="stylesheet" href="css/display-shell.css" />
  <link rel="stylesheet" href="css/display-classic.css" />
  <link rel="stylesheet" href="css/display-blue.css" />
  <link rel="stylesheet" href="css/wheel.css" />
  <link rel="stylesheet" href="css/wheel-ui.css" />
</head>

<body>
  <div class="iBody">

    <div class="iDisplay">
      <div id="displayRoot" class="displayRoot theme-classic"></div>
    </div>

    <div class="iWheel">
  <div class="iWheelRing" aria-hidden="true"></div>
  <button type="button" class="iWheelCenter" aria-label="Confirm"></button>

      <button type="button" class="iWheelZone iWheelZone--top"></button>
      <button type="button" class="iWheelZone iWheelZone--right"></button>
      <button type="button" class="iWheelZone iWheelZone--bottom"></button>
      <button type="button" class="iWheelZone iWheelZone--left"></button>

      <div class="iWheelIcon iWheelIcon--top">
        <button class="cardBtn" type="button" aria-label="Card button">
          <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <mask id="waveCut">
                <rect width="240" height="240" fill="black"/>
                <rect x="20" y="20" width="200" height="200" rx="30" ry="30" fill="white"/>
                <path
                  d="M -20 141.2
                     C -18.3 143.4, -13.3 152.0, -10.0 154.2
                     C  -6.7 156.4,  -3.3 156.4,   0.0 154.2
                     C   3.3 152.0,   6.7 146.9,  10.0 141.2
                     C  13.3 135.5,  16.7 127.1,  20.0 120.0
                     C  23.3 112.9,  26.7 104.5,  30.0  98.8
                     C  33.3  93.1,  36.7  88.0,  40.0  85.8
                     C  43.3  83.6,  46.7  83.6,  50.0  85.8
                     C  53.3  88.0,  56.7  93.1,  60.0  98.8
                     C  63.3 104.5,  66.7 112.9,  70.0 120.0
                     C  73.3 127.1,  76.7 135.5,  80.0 141.2
                     C  83.3 146.9,  86.7 152.0,  90.0 154.2
                     C  93.3 156.4,  96.7 156.4, 100.0 154.2
                     C 103.3 152.0, 106.7 146.9, 110.0 141.2
                     C 113.3 135.5, 116.7 127.1, 120.0 120.0
                     C 123.3 112.9, 126.7 104.5, 130.0  98.8
                     C 133.3  93.1, 136.7  88.0, 140.0  85.8
                     C 143.3  83.6, 146.7  83.6, 150.0  85.8
                     C 153.3  88.0, 156.7  93.1, 160.0  98.8
                     C 163.3 104.5, 166.7 112.9, 170.0 120.0
                     C 173.3 127.1, 176.7 135.5, 180.0 141.2
                     C 183.3 146.9, 186.7 152.0, 190.0 154.2
                     C 193.3 156.4, 196.7 156.4, 200.0 154.2
                     C 203.3 152.0, 206.7 146.9, 210.0 141.2"
                  fill="none"
                  stroke="black"
                  stroke-width="12"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </mask>
            </defs>

            <rect x="20" y="20" width="200" height="200" rx="30" ry="30" fill="black" mask="url(#waveCut)"/>
          </svg>
        </button>
      </div>

      <div class="iWheelIcon iWheelIcon--right">
  <svg class="wheelGlyph" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M7 6l8 6-8 6V6zm9 0h2v12h-2V6z"></path>
  </svg>
</div>

<div class="iWheelIcon iWheelIcon--bottom">
  <svg class="wheelGlyph" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M8 6h3v12H8V6zm5 0l6 6-6 6V6z"></path>
  </svg>
</div>

<div class="iWheelIcon iWheelIcon--left">
  <svg class="wheelGlyph" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M17 6L9 12l8 6V6zM7 6h2v12H7V6z"></path>
  </svg>
</div>
  

  </div>


  <script src="js/settings-storage.js"></script>
  <script src="js/display-data.js"></script>
  <script src="js/playlist-data.js"></script>
  <script src="js/player-engine.js"></script>
  <script src="js/display-render.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/main.js"></script>
  <script src="js/display-controls.js"></script>
  <script src="js/display-menu.js"></script>
  <script src="js/drag-player.js"></script>

  
</body>
</html>
